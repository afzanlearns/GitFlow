# GitFlow Configuration
gitflow:
  scrape_interval_hours: 1
  database_path: ~/.gitflow/gitflow.db

notifications:
  enabled: true
  
  # Slack
  slack_webhook: null  # e.g., https://hooks.slack.com/services/YOUR/WEBHOOK
  
  # Email (Gmail example)
  email_enabled: false
  email_address: null
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_username: null  # your@gmail.com
  smtp_user: null      # your@email.com (legacy key)
  smtp_password: null  # Use app password for Gmail

analytics:
  productivity_threshold: 80
  streak_reset_days: 1

scheduler:
  daily_stats_time: "00:01"
  daily_digest_time: "08:00"

ui:
  theme: "dark"
