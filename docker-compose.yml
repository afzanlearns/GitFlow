version: '3.8'
services:
  gitflow-scraper:
    build: .
    volumes:
      - gitflow_data:/root/.gitflow
      - /path/to/your/repos:/repos:ro
    environment:
      - GITFLOW_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gitflow_data:
